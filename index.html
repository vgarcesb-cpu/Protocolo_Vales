<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema AGA | Protocolo</title>
    <style>
        :root { --blue: #2c3e50; --green: #27ae60; --yellow: #f1c40f; --red: #e74c3c; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .card { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-top: 10px solid var(--blue); box-sizing: border-box; position: relative; }
        
        h2 { text-align: center; color: var(--blue); margin: 0 0 15px 0; font-size: 1.2em; text-transform: uppercase; }
        
        .search-container { display: flex; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd; }
        .search-container input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        
        /* ESTADOS CON FORZADO DE COLOR PARA IMPRESIÓN */
        .status { 
            text-align: center; font-weight: bold; padding: 12px; margin-bottom: 15px; border-radius: 6px; 
            font-size: 14px; text-transform: uppercase; border: 1px solid rgba(0,0,0,0.1);
            print-color-adjust: exact; -webkit-print-color-adjust: exact; 
        }
        .status-emision { background-color: var(--yellow) !important; color: #000 !important; }
        .status-registrado { background-color: var(--red) !important; color: #fff !important; }
        .status-devuelto { background-color: var(--green) !important; color: #fff !important; }

        .field { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--blue); margin-bottom: 4px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; font-size: 14px; color: #000; }
        input[readonly] { background: #f1f3f4; font-weight: bold; }

        #signature-wrap { border: 2px dashed var(--blue); background: #fff; border-radius: 8px; height: 180px; position: relative; margin-top: 5px; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        
        .btn-save { background: var(--green); color: white; }
        .btn-return { background: var(--purple); color: white; display: none; }
        .btn-new { background: var(--blue); color: white; }
        .btn-clear { background: #95a5a6; color: white; padding: 6px 12px; width: auto; font-size: 11px; margin-top: 5px; float: right; border-radius: 4px; border: none; }

        @media print {
            .search-container, .btn, .btn-clear, .btn-group { display: none !important; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: 1px solid #000; width: 100%; max-width: 100%; }
            /* Asegurar que el estado se vea en el PDF */
            .status { border: 2px solid #000 !important; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2 id="tituloPrincipal">AGA: PROTOCOLO DE CUSTODIA</h2>

    <div class="search-container">
        <input type="text" id="busquedaId" placeholder="Buscar ID para Devolución...">
        <button onclick="buscarRegistro()" style="background:var(--blue); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">BUSCAR</button>
    </div>

    <div id="statusTxt" class="status status-emision">ESTADO: EN EMISIÓN</div>

    <div class="field">
        <label>ID de Transacción</label>
        <input type="text" id="idVale" readonly>
    </div>

    <div class="field">
        <label>Fecha del Movimiento</label>
        <input type="text" id="fecha" readonly>
    </div>

    <div class="field">
        <label>Descripción del BMI (Equipo)</label>
        <input type="text" id="producto" placeholder="...">
    </div>

    <div class="field">
        <label>Responsable de Cargo</label>
        <input type="text" id="responsable" placeholder="...">
    </div>

    <div class="field">
        <label>Observaciones Técnicas</label>
        <textarea id="obs" rows="2"></textarea>
    </div>

    <div class="field">
        <label>Firma de Responsabilidad</label>
        <div id="signature-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <button id="btnClear" class="btn-clear" onclick="limpiarCanvas()">BORRAR FIRMA</button>
    </div>

    <div class="btn-group">
        <button id="btnFinalizar" class="btn btn-save" onclick="finalizarYRegistrar()">FINALIZAR Y REGISTRAR ENTREGA</button>
        <button id="btnDevolucion" class="btn btn-return" onclick="marcarDevuelto()">REGISTRAR DEVOLUCIÓN (CERRAR CICLO)</button>
        <button class="btn btn-new" onclick="nuevaEmision()">NUEVO PROCEDIMIENTO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    window.onload = () => { nuevaEmision(); setupCanvas(); };

    function setupCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    }

    function nuevaEmision() {
        document.getElementById('idVale').value = "AGA-2026-" + Math.floor(Math.random()*8999+1000);
        document.getElementById('fecha').value = new Date().toLocaleString();
        document.getElementById('producto').value = "";
        document.getElementById('responsable').value = "";
        document.getElementById('obs').value = "";
        document.getElementById('tituloPrincipal').innerText = "AGA: PROTOCOLO DE CUSTODIA";
        
        const status = document.getElementById('statusTxt');
        status.innerText = "ESTADO: EN EMISIÓN";
        status.className = "status status-emision";
        
        document.getElementById('btnFinalizar').style.display = "block";
        document.getElementById('btnDevolucion').style.display = "none";
        document.getElementById('btnClear').style.display = "block";
        limpiarCanvas();
    }

    // Dibujo Híbrido
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
            y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
        };
    }
    function start(e) { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); }
    function move(e) { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', () => drawing = false);

    function limpiarCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function buscarRegistro() {
        const id = document.getElementById('busquedaId').value.trim();
        const db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        const reg = db.find(r => r.id === id);

        if(reg) {
            document.getElementById('idVale').value = reg.id;
            document.getElementById('fecha').value = reg.fecha;
            document.getElementById('producto').value = reg.producto;
            document.getElementById('responsable').value = reg.responsable;
            document.getElementById('obs').value = reg.obs;
            
            const img = new Image();
            img.onload = () => { limpiarCanvas(); ctx.drawImage(img, 0, 0); };
            img.src = reg.firma;

            const status = document.getElementById('statusTxt');
            if(reg.estado === "DEVUELTO") {
                status.innerText = "ESTADO: DEVOLUCIÓN COMPLETADA";
                status.className = "status status-devuelto";
                document.getElementById('tituloPrincipal').innerText = "ACTA DE RECEPCIÓN / DEVOLUCIÓN";
                document.getElementById('btnFinalizar').style.display = "none";
                document.getElementById('btnDevolucion').style.display = "none";
                document.getElementById('btnClear').style.display = "none";
            } else {
                status.innerText = "ESTADO: EQUIPO EN CUSTODIA (REGISTRADO)";
                status.className = "status status-registrado";
                document.getElementById('btnFinalizar').style.display = "none";
                document.getElementById('btnDevolucion').style.display = "block";
                document.getElementById('btnClear').style.display = "none";
            }
        } else { alert("ID no encontrado."); }
    }

    function finalizarYRegistrar() {
        if(!document.getElementById('producto').value || !document.getElementById('responsable').value) return alert("Complete los datos.");
        
        const data = {
            id: document.getElementById('idVale').value,
            fecha: document.getElementById('fecha').value,
            producto: document.getElementById('producto').value,
            responsable: document.getElementById('responsable').value,
            obs: document.getElementById('obs').value,
            firma: canvas.toDataURL(),
            estado: "REGISTRADO"
        };

        let db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        db.push(data);
        localStorage.setItem('AGA_DB', JSON.stringify(db));

        // Actualizar UI antes de imprimir
        document.getElementById('statusTxt').innerText = "ESTADO: EQUIPO EN CUSTODIA (REGISTRADO)";
        document.getElementById('statusTxt').className = "status status-registrado";
        
        document.title = "Registro_" + data.id;
        window.print();
    }

    function marcarDevuelto() {
        const id = document.getElementById('idVale').value;
        let db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        const index = db.findIndex(r => r.id === id);
        
        if(index !== -1) {
            db[index].estado = "DEVUELTO";
            db[index].fecha = "DEVUELTO EL: " + new Date().toLocaleString();
            localStorage.setItem('AGA_DB', JSON.stringify(db));
            
            // CAMBIO VISUAL INMEDIATO PARA LA IMPRESIÓN
            const status = document.getElementById('statusTxt');
            status.innerText = "ESTADO: DEVOLUCIÓN COMPLETADA";
            status.className = "status status-devuelto";
            document.getElementById('tituloPrincipal').innerText = "ACTA DE RECEPCIÓN / DEVOLUCIÓN";
            document.getElementById('fecha').value = db[index].fecha;
            
            document.title = "Devolucion_" + id;
            
            // Disparar impresión con el estado VERDE visible
            setTimeout(() => { 
                window.print();
                alert("Ciclo Cerrado Exitosamente.");
            }, 500);
        }
    }
</script>
</body>
</html>
